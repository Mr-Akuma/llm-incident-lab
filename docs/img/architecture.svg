<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Segoe UI',Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cc8df"/><stop offset="1" stop-color="#b08cff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12151c"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <marker id="ar-red" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#ff6b7a"/></marker>
    <marker id="ar-yel" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#f2c97a"/></marker>
    <marker id="ar-cyn" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#5cc8df"/></marker>
    <marker id="ar-dim" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#7a8696"/></marker>
  </defs>

  <rect width="1200" height="720" fill="#0b0d12"/>

  <text x="60" y="64" fill="#fff" font-size="34" font-weight="800" letter-spacing="-1">From Chat Box to Cloud Admin</text>
  <text x="60" y="98" fill="#9aa3b2" font-size="19">The harness is the trust boundary - not the model.</text>

  <!-- flow nodes -->
  <!-- USER -->
  <g filter="url(#sh)">
    <rect x="60" y="170" width="300" height="100" rx="18" fill="url(#card)" stroke="#ff6b7a" stroke-width="2.5"/>
  </g>
  <text x="210" y="214" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">USER MESSAGE</text>
  <text x="210" y="242" text-anchor="middle" fill="#9aa3b2" font-size="16">untrusted · attacker-influenced</text>

  <!-- HARNESS -->
  <g filter="url(#sh)">
    <rect x="450" y="170" width="300" height="100" rx="18" fill="url(#card)" stroke="#f2c97a" stroke-width="2.5"/>
  </g>
  <text x="600" y="214" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">HARNESS</text>
  <text x="600" y="242" text-anchor="middle" fill="#f2c97a" font-size="16">the gate - where security lives</text>

  <!-- CLOUD -->
  <g filter="url(#sh)">
    <rect x="840" y="170" width="300" height="100" rx="18" fill="url(#card)" stroke="#5cc8df" stroke-width="2.5"/>
  </g>
  <text x="990" y="214" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">CLOUD</text>
  <text x="990" y="242" text-anchor="middle" fill="#9aa3b2" font-size="16">real, irreversible side effects</text>

  <!-- MODEL -->
  <g filter="url(#sh)">
    <rect x="450" y="380" width="300" height="92" rx="18" fill="url(#card)" stroke="#5cc8df" stroke-width="2.5"/>
  </g>
  <text x="600" y="420" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">MODEL</text>
  <text x="600" y="447" text-anchor="middle" fill="#9aa3b2" font-size="16">proposes tool calls</text>

  <!-- arrows -->
  <line x1="362" y1="220" x2="442" y2="220" stroke="#ff6b7a" stroke-width="3" marker-end="url(#ar-red)"/>
  <text x="402" y="206" text-anchor="middle" fill="#ff6b7a" font-size="15">prompt</text>
  <line x1="752" y1="220" x2="832" y2="220" stroke="#f2c97a" stroke-width="3" marker-end="url(#ar-yel)"/>
  <text x="792" y="206" text-anchor="middle" fill="#f2c97a" font-size="15">tool calls</text>
  <line x1="600" y1="378" x2="600" y2="278" stroke="#5cc8df" stroke-width="3" marker-end="url(#ar-cyn)"/>
  <text x="664" y="330" text-anchor="middle" fill="#5cc8df" font-size="15">requests</text>

  <!-- attack chain -->
  <text x="60" y="556" fill="#fff" font-size="20" font-weight="700">The attack chain · three Atlas domains</text>
  <g font-size="15">
    <!-- D -->
    <rect x="60" y="578" width="320" height="96" rx="14" fill="url(#card)" stroke="#ff6b7a" stroke-width="2"/>
    <circle cx="104" cy="626" r="22" fill="none" stroke="#ff6b7a" stroke-width="2.5"/>
    <text x="104" y="634" text-anchor="middle" fill="#ff6b7a" font-size="22" font-weight="800">D</text>
    <text x="140" y="620" fill="#fff" font-size="18" font-weight="600">tool-choice</text>
    <text x="140" y="644" fill="#fff" font-size="18" font-weight="600">manipulation</text>

    <line x1="384" y1="626" x2="436" y2="626" stroke="#7a8696" stroke-width="3" marker-end="url(#ar-dim)"/>

    <!-- E -->
    <rect x="440" y="578" width="320" height="96" rx="14" fill="url(#card)" stroke="#f2c97a" stroke-width="2"/>
    <circle cx="484" cy="626" r="22" fill="none" stroke="#f2c97a" stroke-width="2.5"/>
    <text x="484" y="634" text-anchor="middle" fill="#f2c97a" font-size="22" font-weight="800">E</text>
    <text x="520" y="620" fill="#fff" font-size="18" font-weight="600">approval-gate</text>
    <text x="520" y="644" fill="#fff" font-size="18" font-weight="600">bypass</text>

    <line x1="764" y1="626" x2="816" y2="626" stroke="#7a8696" stroke-width="3" marker-end="url(#ar-dim)"/>

    <!-- F -->
    <rect x="820" y="578" width="320" height="96" rx="14" fill="url(#card)" stroke="#5cc8df" stroke-width="2"/>
    <circle cx="864" cy="626" r="22" fill="none" stroke="#5cc8df" stroke-width="2.5"/>
    <text x="864" y="634" text-anchor="middle" fill="#5cc8df" font-size="22" font-weight="800">F</text>
    <text x="900" y="620" fill="#fff" font-size="18" font-weight="600">broken</text>
    <text x="900" y="644" fill="#fff" font-size="18" font-weight="600">authorization</text>
  </g>
</svg>
